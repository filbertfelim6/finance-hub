<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 24px;">

    <div>
      <div class="fh-meta" style="margin-bottom:6px;">Total · Net worth</div>
      <div style="font-family:var(--font-sans); font-feature-settings:'tnum' 1,'lnum' 1; font-size:44px; font-weight:600; letter-spacing:-0.02em; line-height:1;">Rp 5.507.086.769</div>
    </div>

    <div>
      <div class="fh-meta" style="margin-bottom:6px;">Compact · Account</div>
      <div style="font-family:var(--font-sans); font-feature-settings:'tnum' 1,'lnum' 1; font-size:18px; font-weight:600;">Rp 1.338.850.880</div>
      <div style="font-family:var(--font-sans); font-size:11px; color:var(--fg-3); margin-top:2px; font-feature-settings:'tnum' 1;">≈ $83,678.18</div>
    </div>

    <div>
      <div class="fh-meta" style="margin-bottom:6px;">Delta · Positive</div>
      <div style="font-family:var(--font-sans); font-feature-settings:'tnum' 1; font-size:15px; font-weight:600; color:var(--good-500);">+ Rp 412.090</div>
    </div>

    <div>
      <div class="fh-meta" style="margin-bottom:6px;">Delta · Negative</div>
      <div style="font-family:var(--font-sans); font-feature-settings:'tnum' 1; font-size:15px; font-weight:600; color:var(--bad-500);">− Rp 2.000.000</div>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">tnum · lnum · real minus (U+2212), not hyphen</div>
</div>
</body></html>
