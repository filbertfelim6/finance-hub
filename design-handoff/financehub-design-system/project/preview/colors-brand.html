<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">
    <div class="sw"><div class="sw-chip" style="background:var(--green-50);"></div><div class="sw-name">green-50</div><div class="sw-hex">#f1f5ef</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-100);"></div><div class="sw-name">green-100</div><div class="sw-hex">#e3ebde</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-200);"></div><div class="sw-name">green-200</div><div class="sw-hex">#c8d6bf</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-300);"></div><div class="sw-name">green-300</div><div class="sw-hex">#a6bb98</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-400);"></div><div class="sw-name">green-400</div><div class="sw-hex">#7d9870</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-500); outline:2px solid var(--green-700); outline-offset:2px;"></div><div class="sw-name" style="color:var(--green-700);">green-500 ★</div><div class="sw-hex">#5a7a4e</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-600);"></div><div class="sw-name">green-600</div><div class="sw-hex">#466239</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-700);"></div><div class="sw-name" style="color:#fff;background:var(--green-700);padding:1px 4px;border-radius:3px;display:inline-block;">green-700</div><div class="sw-hex">#364d2c</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-800);"></div><div class="sw-name" style="color:#fff;background:var(--green-800);padding:1px 4px;border-radius:3px;display:inline-block;">green-800</div><div class="sw-hex">#2a3c23</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-900);"></div><div class="sw-name" style="color:#fff;background:var(--green-900);padding:1px 4px;border-radius:3px;display:inline-block;">green-900</div><div class="sw-hex">#1f2c1a</div></div>
    <div class="sw"><div class="sw-chip" style="background:var(--green-950);"></div><div class="sw-name" style="color:#fff;background:var(--green-950);padding:1px 4px;border-radius:3px;display:inline-block;">green-950</div><div class="sw-hex">#131c10</div></div>
    <div class="sw" style="grid-column: span 1; align-self:end;"><div class="fh-meta">Brand · ★ primary</div></div>
  </div>
</div>
</body></html>
