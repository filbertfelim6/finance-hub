<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:flex; flex-wrap:wrap; gap:8px;">
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--good-100); color:var(--good-500); border-radius:999px; font-size:12px; font-weight:600;"><span style="width:6px; height:6px; border-radius:999px; background:var(--good-500);"></span>Income</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--bad-100); color:var(--bad-500); border-radius:999px; font-size:12px; font-weight:600;"><span style="width:6px; height:6px; border-radius:999px; background:var(--bad-500);"></span>Expense</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--warn-100); color:var(--warn-500); border-radius:999px; font-size:12px; font-weight:600;">Approaching budget</span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--info-100); color:var(--info-500); border-radius:999px; font-size:12px; font-weight:600;">AI insight</span>
    <span style="display:inline-flex; padding:4px 10px; background:var(--cream-100); color:var(--fg-2); border-radius:999px; font-size:12px; font-weight:500; border:1px solid var(--border-soft);">Recurring</span>
    <span style="display:inline-flex; padding:4px 10px; background:var(--brand); color:var(--fg-on-brand); border-radius:999px; font-size:12px; font-weight:600;">Beta</span>
  </div>

  <div style="margin-top:14px; display:inline-flex; padding:3px; background:var(--cream-100); border-radius:999px; gap:2px;">
    <button style="padding:5px 12px; border-radius:999px; border:none; font-size:12px; font-weight:600; color:var(--fg-3); background:transparent;">7D</button>
    <button style="padding:5px 12px; border-radius:999px; border:none; font-size:12px; font-weight:600; color:var(--fg-on-brand); background:var(--brand);">30D</button>
    <button style="padding:5px 12px; border-radius:999px; border:none; font-size:12px; font-weight:600; color:var(--fg-3); background:transparent;">90D</button>
    <button style="padding:5px 12px; border-radius:999px; border:none; font-size:12px; font-weight:600; color:var(--fg-3); background:transparent;">1Y</button>
    <button style="padding:5px 12px; border-radius:999px; border:none; font-size:12px; font-weight:600; color:var(--fg-3); background:transparent;">Custom</button>
  </div>
  <div style="margin-top:12px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">Period selector mirrors the reference dashboard</div>
</div>
</body></html>
