<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items:end;">
    <div style="text-align:center;">
      <div style="height:64px; background:var(--green-100); border:1px solid var(--border-soft); border-radius:4px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">xs · 4</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:var(--green-100); border:1px solid var(--border-soft); border-radius:6px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">sm · 6</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:var(--green-100); border:1px solid var(--border-soft); border-radius:10px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">md · 10</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:var(--green-200); border:1px solid var(--border-soft); border-radius:14px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">lg · 14 ★</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:var(--green-200); border:1px solid var(--border-soft); border-radius:20px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">xl · 20</div>
    </div>
    <div style="text-align:center;">
      <div style="height:64px; background:var(--green-300); border:1px solid var(--border-soft); border-radius:999px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">pill · ∞</div>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">★ lg = workhorse for cards · pill for chips & segmented controls</div>
</div>
</body></html>
