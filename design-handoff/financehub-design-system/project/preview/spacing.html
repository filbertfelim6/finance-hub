<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:grid; grid-template-columns: 60px 1fr 80px; gap: 10px 14px; align-items: center;">
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-1</div>
    <div style="height:4px; background:var(--green-300); border-radius:2px; width:4px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">4px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-2</div>
    <div style="height:4px; background:var(--green-300); border-radius:2px; width:8px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">8px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-3</div>
    <div style="height:4px; background:var(--green-300); border-radius:2px; width:12px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">12px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-4</div>
    <div style="height:4px; background:var(--green-400); border-radius:2px; width:16px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">16px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-6</div>
    <div style="height:4px; background:var(--green-400); border-radius:2px; width:24px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">24px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-7</div>
    <div style="height:4px; background:var(--green-500); border-radius:2px; width:32px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">32px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-8</div>
    <div style="height:4px; background:var(--green-500); border-radius:2px; width:40px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">40px</div>

    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">space-10</div>
    <div style="height:4px; background:var(--green-600); border-radius:2px; width:64px;"></div>
    <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-3); text-align:right;">64px</div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">4-px base · 8/16 intra-component · 24 between cards · 40+ between sections</div>
</div>
</body></html>
