<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div style="background:var(--good-100); border:1px solid var(--border-soft); border-radius:10px; padding:14px;">
      <div style="width:18px; height:18px; border-radius:6px; background:var(--good-500); margin-bottom:10px;"></div>
      <div class="fh-meta" style="margin-bottom:2px;">Good</div>
      <div style="font-size:14px; font-weight:600; color:var(--good-500);">+ Rp 412.090</div>
      <div style="font-size:11px; color:var(--fg-3); font-family:var(--font-mono); margin-top:6px;">#6b8e4e</div>
    </div>

    <div style="background:var(--warn-100); border:1px solid var(--border-soft); border-radius:10px; padding:14px;">
      <div style="width:18px; height:18px; border-radius:6px; background:var(--warn-500); margin-bottom:10px;"></div>
      <div class="fh-meta" style="margin-bottom:2px;">Warn</div>
      <div style="font-size:14px; font-weight:600; color:var(--warn-500);">Approaching limit</div>
      <div style="font-size:11px; color:var(--fg-3); font-family:var(--font-mono); margin-top:6px;">#c89b3c</div>
    </div>

    <div style="background:var(--bad-100); border:1px solid var(--border-soft); border-radius:10px; padding:14px;">
      <div style="width:18px; height:18px; border-radius:6px; background:var(--bad-500); margin-bottom:10px;"></div>
      <div class="fh-meta" style="margin-bottom:2px;">Bad</div>
      <div style="font-size:14px; font-weight:600; color:var(--bad-500);">− Rp 2.000.000</div>
      <div style="font-size:11px; color:var(--fg-3); font-family:var(--font-mono); margin-top:6px;">#b8615a</div>
    </div>

    <div style="background:var(--info-100); border:1px solid var(--border-soft); border-radius:10px; padding:14px;">
      <div style="width:18px; height:18px; border-radius:6px; background:var(--info-500); margin-bottom:10px;"></div>
      <div class="fh-meta" style="margin-bottom:2px;">Info</div>
      <div style="font-size:14px; font-weight:600; color:var(--info-500);">Forecast updated</div>
      <div style="font-size:11px; color:var(--fg-3); font-family:var(--font-mono); margin-top:6px;">#5a7a8e</div>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">All semantic colors are deliberately desaturated. Bad is terracotta, never alarm-red.</div>
</div>
</body></html>
