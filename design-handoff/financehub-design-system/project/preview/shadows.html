<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card">
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 14px;">
    <div style="text-align:center;">
      <div style="height:80px; background:#fff; border-radius:10px; box-shadow: 0 1px 0 rgba(26,31,23,0.04);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">xs</div>
    </div>
    <div style="text-align:center;">
      <div style="height:80px; background:#fff; border-radius:10px; box-shadow: 0 1px 2px rgba(26,31,23,0.05), 0 1px 1px rgba(26,31,23,0.03);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">sm</div>
    </div>
    <div style="text-align:center;">
      <div style="height:80px; background:#fff; border-radius:10px; box-shadow: 0 4px 12px -2px rgba(26,31,23,0.08), 0 2px 4px rgba(26,31,23,0.04);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">md ★</div>
    </div>
    <div style="text-align:center;">
      <div style="height:80px; background:#fff; border-radius:10px; box-shadow: 0 12px 32px -8px rgba(26,31,23,0.14), 0 4px 8px rgba(26,31,23,0.05);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">lg</div>
    </div>
    <div style="text-align:center;">
      <div style="height:80px; background:#fff; border-radius:10px; box-shadow: 0 24px 60px -12px rgba(26,31,23,0.22), 0 8px 16px rgba(26,31,23,0.06);"></div>
      <div style="font-family:var(--font-mono); font-size:11px; margin-top:6px;">xl</div>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">★ md is default for raised cards · soft, warm-tinted, low-spread</div>
</div>
</body></html>
