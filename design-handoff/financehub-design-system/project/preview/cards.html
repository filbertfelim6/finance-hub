<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card" style="background:var(--cream-50);">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">

    <!-- Account card -->
    <div style="background:#fff; border:1px solid var(--border-soft); border-radius:14px; padding:16px; box-shadow: var(--shadow-sm);">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="width:32px; height:32px; border-radius:8px; background:var(--info-100); display:flex; align-items:center; justify-content:center; color:var(--info-500);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          </div>
          <div>
            <div style="font-size:14px; font-weight:600;">Mandiri</div>
            <div style="font-size:12px; color:var(--fg-3);">Checking</div>
          </div>
        </div>
        <span style="color:var(--fg-3); font-size:18px; line-height:1;">···</span>
      </div>
      <div class="fh-meta" style="margin-bottom:4px;">Balance</div>
      <div style="font-size:22px; font-weight:600; font-feature-settings:'tnum' 1; letter-spacing:-0.01em;">Rp 5.841.067</div>
      <div style="font-size:11px; color:var(--fg-3); font-feature-settings:'tnum' 1; margin-top:2px;">≈ Rp 5,841,067</div>
    </div>

    <!-- Stat card -->
    <div style="background:#fff; border:1px solid var(--border-soft); border-radius:14px; padding:16px; box-shadow: var(--shadow-sm);">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <div style="width:32px; height:32px; border-radius:8px; background:var(--good-100); display:flex; align-items:center; justify-content:center; color:var(--good-500);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
        <div class="fh-meta">Income · 30D</div>
      </div>
      <div style="font-size:22px; font-weight:600; font-feature-settings:'tnum' 1;">Rp 12.460.000</div>
      <div style="font-size:12px; color:var(--good-500); margin-top:4px; font-weight:500;">+ 8.4% from prev period</div>
    </div>
  </div>
  <div style="margin-top:12px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);">Card = #fff · radius-lg (14) · shadow-sm · 1px border-soft</div>
</div>
</body></html>
