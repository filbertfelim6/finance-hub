<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="fh-card" style="background:var(--cream-50); padding:0;">
  <div style="display:grid; grid-template-columns: 220px 1fr; min-height: 280px;">
    <!-- Sidebar -->
    <aside style="background:var(--bg-surface); border-right:1px solid var(--border-soft); padding:16px 12px; display:flex; flex-direction:column; gap:4px;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:6px 8px; margin-bottom:10px;">
        <span style="font-family:var(--font-display); font-size:18px; font-weight:600;">FinanceHub</span>
        <span style="color:var(--fg-3); font-size:12px;">‹</span>
      </div>
      <button style="display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; background:var(--brand); color:var(--fg-on-brand); border:none; font-size:13px; font-weight:600; box-shadow: var(--shadow-inset), var(--shadow-sm); margin-bottom:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Log transaction
      </button>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:var(--fg-1); background:var(--cream-100); font-size:13px; font-weight:500;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Dashboard
      </a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:var(--fg-2); font-size:13px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
        Accounts
      </a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:var(--fg-2); font-size:13px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Transactions
      </a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:var(--fg-2); font-size:13px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
        Portfolio
      </a>
      <a style="display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:var(--fg-2); font-size:13px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Ask AI
      </a>
    </aside>
    <!-- Hint -->
    <div style="padding:18px; display:flex; flex-direction:column; gap:10px; justify-content:center;">
      <div class="fh-meta">Sidebar nav</div>
      <div style="font-size:14px; color:var(--fg-2); line-height:1.5;">224px wide · primary CTA at top · subtle row hover (cream-100 bg) · active row uses cream-100 + ink-900 text · brand accent reserved for the primary CTA.</div>
    </div>
  </div>
</div>
</body></html>
